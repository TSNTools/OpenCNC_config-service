syntax = "proto3";

package stp_status;

option go_package = "OpenCNC_config_service/common/structures/stp;stp";

import "common/structures/stp/stp.proto";

/*
 * STP (Spanning Tree Protocol) runtime status and managed objects.
 * Reflects current operational state as reported by bridges.
 * References IEEE 802.1Q-2022:
 * - Clause 13 (Spanning Tree Protocol behavior)
 * - Clause 12.30 (Bridge Management Information)
 */

message StpStatusReport {
  repeated BridgeStpStatus bridges = 1; // Status of all bridges in the network
}

message BridgeStpStatus {
  string bridge_id = 1;                   // Unique identifier for the bridge (MAC or UUID)
  string node_id = 2;                     // Matches Node.name in topology

  repeated StpInstanceStatus instances = 3; // Status of each STP instance on the bridge
  bool stp_enabled = 4;                   // Global STP enable status (Clause 13.5.1)
  string bridge_priority = 5;            // Bridge priority as seen in BPDUs (informational)
  uint64 last_updated_ns = 6;            // Timestamp of last update (nanoseconds since epoch)
}

message StpInstanceStatus {
  string instance_id = 1;                 // Instance identifier ("cist", "mst0", etc.)
  string root_bridge_id = 2;              // Root bridge ID for this instance
  uint32 root_path_cost = 3;              // Cost to reach root bridge
  string designated_bridge_id = 4;        // Designated bridge ID for this instance
  repeated PortStpStatus port_states = 5; // Per-port STP state information
}

message PortStpStatus {
  string port_id = 1;                     // Matches Port.id in topology
  stp.PortRole role = 2;                  // Port role (Clause 13.25.5)
  stp.PortState state = 3;                // Port state (Clause 13.25.6)
  bool forwarding = 4;                    // Whether port is currently forwarding frames
  uint32 port_priority = 5;               // Admin or operational port priority
  uint32 port_path_cost = 6;              // Port cost (Clause 13.24.2)
  string designated_root = 7;             // Root bridge ID as reported in BPDU
  string designated_bridge = 8;           // Designated bridge on the segment
  string designated_port_id = 9;          // Port ID of the designated port
  bool topology_change_ack = 10;          // True if Topology Change ACK received
  bool tc_propagation = 11;               // Topology Change propagation flag
  bool proposal_received = 12;            // Indicates if RSTP proposal was received
  bool agreement = 13;                    // Indicates RSTP handshake agreement status
}