syntax = "proto3";

package topology_config;

option go_package = "/topology_config";

import "common/structures/qbv/qbv.proto";  // IEEE 802.1Qbv time aware shaper
import "common/structures/qav/qav.proto";  // IEEE 802.1Qav credit based shaper
import "common/structures/stp/stp.proto";  // IEEE 802.1D/Q STP
import "common/structures/vlan/vlan.proto"; // IEEE 802.1Q VLAN domain model


/*
 * TopologyConfig defines runtime-configurable aspects of the network.
 * Complements static definitions in topology.proto.
 *
 * References:
 * - IEEE 802.1Q-2022 Clauses 6–8 (VLANs, Queuing)
 * - Clause 12.29/12.30: Port and Bridge Managed Objects
 * - Clause 13: Spanning Tree Protocol (see stp.proto)
 */

message TopologyConfig {
  string config_id = 1;
  repeated NodeConfig node_configs = 2;
  repeated LinkConfig link_configs = 3;
}

/*
 * Per-node configuration matching Node.name in topology.proto
 */
message NodeConfig {
  string node_id = 1;
  optional BridgeConfig bridge = 2;
  optional EndStationConfig end_station = 3;
  optional BridgedEndStationConfig bridged_end_station = 4;
  repeated PortConfig port_configs = 5;
}

// ===========================
// Role-Specific Configurations
// ===========================

message BridgeConfig {
  optional stp.StpConfiguration stp = 1;
  optional bool gptp_enabled = 2;
  optional bool frame_preemption_enabled = 3;
  optional vlan.BridgeVlanConfig vlan_config = 4;

  optional stp.BridgeMstConfig mst_config = 5; // MST resource mapping (FID -> MSTID)
}

message EndStationConfig {
  optional bool participate_in_time_sync = 1;
}

message BridgedEndStationConfig {
  optional bool forwarding_enabled = 1;
}

// ===========================
// Per-Port Configuration
// ===========================

message PortConfig {
  string port_id = 1;

  optional bool is_edge_port = 2;

  optional AdminState admin_state = 3;
  optional bool ingress_enabled = 4;
  optional bool egress_enabled = 5;

  optional uint32 default_priority = 6; // 0–7, used for untagged ingress frames
  optional bool pcp_mapping_enabled = 7; // Enables PCP → internal priority mapping (8.6.6.1)
  repeated TrafficClassTableEntry traffic_class_table = 8;


  optional uint32 default_vlan_id = 9;
  repeated vlan.VlanMembership vlan_memberships = 10;

// New: Optional gPTP port role (if gPTP is enabled at node level)
  optional GptpRole gptp_role = 11;
  
  optional bool stp_enabled = 12;
  optional qbv.GateControlList gcl = 13;

  repeated QueueConfig queue_configs = 14;

  string description = 15;

  // Optional advanced 802.1Q bridge-port VLAN controls.
  optional vlan.PortVlanAdvancedConfig vlan_advanced = 16;
}

enum AdminState {
  ADMIN_STATE_UNSPECIFIED = 0;
  ADMIN_STATE_ENABLED = 1;
  ADMIN_STATE_DISABLED = 2;
}

enum GptpRole {
  GPTP_ROLE_UNSPECIFIED = 0;
  GPTP_ROLE_MASTER = 1;
  GPTP_ROLE_SLAVE = 2;
  GPTP_ROLE_PASSIVE = 3;
  GPTP_ROLE_DISABLED = 4;
}


// IEEE 802.1Q Clause 8.6.6.1
// Per-port Priority to traffic class (=egress queue id) mapping
message TrafficClassTableEntry {
  uint32 pcp = 1;         // Priority Code Point (0–7)
  uint32 egress_queue_id = 2; // Traffic class index (0–7)
}

message QueueConfig {
  uint32 queue_id = 1;
  uint32 max_frame_size = 2;
  uint64 shaper_rate_bps = 3;

  repeated qav.CbsQueueConfig cbs = 4;

  // New: Optional scheduling model (future extensibility)
  optional SchedulingModel scheduling = 5;
}

enum SchedulingModel {
  SCHEDULING_UNSPECIFIED = 0;
  STRICT_PRIORITY = 1;  // SP
  CREDIT_BASED_SHAPER = 2; // CBS
  TIME_AWARE_SCHEDULING = 3; // Qbv
  CYCLIC_QUEUING_FORWARDING = 4; // CQF
}

// ===========================
// Link Configuration
// ===========================

message LinkConfig {
  string link_id = 1;
  optional LinkStateOverride state_override = 2;
}

enum LinkStateOverride {
  UNDEFINED = 0;
  FORCE_UP = 1;
  FORCE_DOWN = 2;
}