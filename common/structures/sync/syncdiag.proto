syntax = "proto3";

package syncdiag;

option go_package = "OpenCNC_config_service/common/structures/sync;syncdiag";

// Represents the synchronization state of a gate control mechanism
message GateSyncDiagnostics {
  string gate_instance_name = 1;   // Name of the gate instance being monitored

  // Timestamp of the last successful sync event (nanoseconds since epoch or device uptime)
  uint64 last_sync_time_ns = 2;

  // Number of sync failures since last reset
  uint32 sync_failure_count = 3;

  // Is the gate currently considered synchronized and healthy?
  bool is_synchronized = 4;

  // Offset between local clock and grandmaster clock (nanoseconds)
  int64 clock_offset_ns = 5;

  // Root mean square (RMS) error of the synchronization offset (nanoseconds)
  uint64 sync_rms_error_ns = 6;

  // Last detected gate schedule mismatch count (e.g., unexpected gate state changes)
  uint32 gate_mismatch_count = 7;

  // Current state of gate cycle relative to expected schedule (e.g., "ON_TIME", "LATE", "EARLY")
  enum SyncState {
    SYNC_STATE_UNSPECIFIED = 0;
    ON_TIME = 1;
    LATE = 2;
    EARLY = 3;
  }
  SyncState sync_state = 8;

  // Optional human-readable status message or comment
  string status_message = 9;
}
